<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>DNA 密码子翻译工具 · 序列操作与对比</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="icon-row">
                <div class="dna-icon">🧬</div>
            </div>
            <h1>DNA 密码子翻译工具</h1>
            <div class="subtitle">输入 DNA 序列，进行翻译与序列操作对比</div>
        </header>

        <section class="card">
            <div class="card-header">
                <div class="badge input">📥</div>
                <h2>输入序列</h2>
                <div class="hint">支持 FASTA 格式；U 会替换为 T</div>
            </div>
            <div class="textarea-wrapper">
                <textarea id="dnaInput" placeholder="在此粘贴 DNA 序列（A/T/C/G）..."></textarea>
                <span class="char-count" id="charCount">0 个有效碱基</span>
            </div>
            <div class="controls-row">
                <label class="toggle-switch" title="必须包含起始密码子ATG才进行翻译"><input type="checkbox" id="strictModeCheckbox" checked><span class="toggle-track"></span><span class="toggle-label-text">严格模式</span></label>
                <span class="label-text" id="readingFrameLabel" style="display:none;">偏移：</span>
                <div class="segmented disabled" id="readingFrameGroup" style="display:none;"><button data-offset="0" class="active">+1</button><button data-offset="1">+2</button><button data-offset="2">+3</button></div>
                <div class="spacer"></div>
                <button class="btn btn-outline" id="btnClear">清空</button>
                <button class="btn btn-primary" id="btnTranslate">翻译</button>
                <button class="btn btn-sm" id="btnExample">示例</button>
                <button class="btn btn-sm" id="btnCopyAA" title="复制氨基酸序列">复制AA</button>
            </div>
            <div id="inputAlert"></div>
        </section>

        <section id="resultCard" class="card" style="display:none;">
            <div class="card-header"><div class="badge result">🧬</div><h2>翻译结果</h2><div class="hint">点击氨基酸可查看详情</div></div>
            <div id="resultAlert"></div>
            <div id="seqHighlightContainer" class="seq-highlight-container"><div class="seq-title">序列高亮</div><div id="seqHighlightRow" class="seq-highlight-row"></div></div>
            <div class="detail-table-wrap"><table class="detail-table"><thead><tr><th>位置</th><th>密码子</th><th>名称</th><th>缩写</th><th>符号</th><th>类别</th><th>标签</th></tr></thead><tbody id="detailTableBody"></tbody></table></div>
        </section>

        <section id="opsCard" class="card" style="display:none;">
            <div class="card-header"><div class="badge ops">🧪</div><h2>序列操作</h2><div class="hint">插入 / 删除 / 替换</div></div>
            <div class="ops-panel">
                <div class="ops-group"><label>操作</label><select id="opsType"><option value="insert">插入</option><option value="delete">删除</option><option value="replace">替换</option></select></div>
                <div class="ops-group"><label id="opsPosLabel">起始位置</label><input id="opsPosStart" type="number" value="1"></div>
                <div class="ops-group" id="opsPosEndGroup" style="display:none;"><label>结束位置</label><input id="opsPosEnd" type="number" value="1"></div>
                <div class="ops-group" id="opsSeqGroup"><label id="opsSeqLabel">插入序列</label><input id="opsInsertSeq" type="text"></div>
                <div class="spacer"></div>
                <button class="btn btn-purple" id="btnApplyOps">应用</button>
                <button class="btn btn-ghost" id="btnResetOps">重置</button>
            </div>
            <div id="opsAlert"></div>
            <div class="ops-result-mini" id="opsResultMini" style="display:none;"></div>
        </section>

        <section id="compareCard" class="card" style="display:none;">
            <div class="card-header"><div class="badge compare">🔍</div><h2>对比</h2></div>
            <div id="compareAlert"></div>
            <div class="compare-grid">
                <div class="compare-card original-card"><div class="compare-label"><span class="dot-indicator"></span>原始</div><div id="origAaChipsRow" class="aa-chips-row"></div><div id="origStatsRow" class="stats-row"></div><div id="origNoResult" class="no-result">无结果</div></div>
                <div class="compare-card modified-card"><div class="compare-label"><span class="dot-indicator"></span>修改后</div><div id="modAaChipsRow" class="aa-chips-row"></div><div id="modStatsRow" class="stats-row"></div><div id="modNoResult" class="no-result">无结果</div></div>
            </div>
        </section>

        <div class="card" style="margin-top:14px;">
            <div class="card-header"><div class="badge table">📚</div><h2>密码子参考</h2><div class="hint">查看每个氨基酸对应的密码子</div></div>
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;"><button id="toggleCodonTable" class="btn btn-ghost">切换到传统表格 <span class="arrow">▼</span></button></div>
            <div id="codonTableContent" class="codon-table-content" style="padding-top:8px;">
                <div id="codonRefGrid" class="codon-ref-grid"></div>
                <div id="codonRefTable" class="codon-ref-table-container" style="display:none;"></div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast" style="display:block;visibility:hidden;"></div>

    <div id="aaModalOverlay" class="modal-overlay" style="display:none;"><div class="modal-dialog"><div class="modal-header-bar"><div></div><button id="modalCloseBtn" class="modal-close-btn">✕</button></div><div id="modalBodyContent" class="modal-body"></div></div></div>

    <script src="script.js"></script>
</body>
</html>
